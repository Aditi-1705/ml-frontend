<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        #status {
            margin-top: 10px;
            text-align: center;
            color: orange;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Breast Cancer Predictor</h2>

    <div class="input-group">
        <label>Radius Mean</label>
        <input type="number" id="radius" value="14.0">
    </div>

    <div class="input-group">
        <label>Texture Mean</label>
        <input type="number" id="texture" value="20.0">
    </div>

    <div class="input-group">
        <label>Perimeter Mean</label>
        <input type="number" id="perimeter" value="90.0">
    </div>

    <div class="input-group">
        <label>Area Mean</label>
        <input type="number" id="area" value="600.0">
    </div>

    <div class="input-group">
        <label>Smoothness Mean</label>
        <input type="number" id="smoothness" value="0.1" step="0.01">
    </div>

    <button onclick="predict()">Predict</button>

    <p id="status"></p>
    <p id="result"></p>

</div>

<script>

async function predict() {

    const status = document.getElementById("status");
    const result = document.getElementById("result");

    status.innerText = "⏳ Predicting...";
    result.innerText = "";

    let radius = parseFloat(document.getElementById("radius").value);
    let texture = parseFloat(document.getElementById("texture").value);
    let perimeter = parseFloat(document.getElementById("perimeter").value);
    let area = parseFloat(document.getElementById("area").value);
    let smoothness = parseFloat(document.getElementById("smoothness").value);

    let features = [
        radius,
        texture,
        perimeter,
        area,
        smoothness,

        0.2,0.15,0.1,0.2,0.06,
        0.3,1.2,2.0,20.0,0.01,
        0.03,0.04,0.02,0.02,0.003,
        16.0,25.0,100.0,800.0,0.15,
        0.3,0.4,0.2,0.3,0.08
    ];

    try {

        const response = await fetch("https://ml-api-project-cquw.onrender.com/predict", {

            method: "POST",

            mode: "cors",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                features: features
            })

        });

        const data = await response.json();

        status.innerText = "✅ Prediction Complete";

        result.innerHTML =
            "Prediction: <span style='color:green'>" + data.result + "</span><br>" +
            "Confidence: " + data.confidence + "%";

    }

    catch(error) {

        console.log(error);

        status.innerText = "⚠️ Server waking up...";

        result.innerText = "Please wait 20 seconds and try again.";
    }

}

</script>

</body>
</html>
